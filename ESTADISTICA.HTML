<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Sentimiento Guinda — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --guinda:     #7a1420;
    --guinda-dk:  #5c0f18;
    --guinda-lt:  #9b1a28;
    --crema:      #f5ede0;
    --crema2:     #ede0cc;
    --crema3:     #e0d0b8;
    --white:      #fffdf9;
    --gold:       #c9973a;
    --text:       #2c1a1a;
    --text2:      #7a5c5c;
    --text3:      #b09090;
    --green:      #2e7d55;
    --green-lt:   #e8f5ee;
    --red-lt:     #fdf0f1;
    --font:       'Plus Jakarta Sans', sans-serif;
    --radius:     16px;
    --radius-sm:  10px;
    --shadow:     0 2px 16px rgba(122,20,32,0.08);
    --shadow-lg:  0 8px 40px rgba(122,20,32,0.13);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--crema);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--guinda);
    border-radius: 0 0 24px 24px;
    padding: 24px 24px 28px;
    margin: 0 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }

  .header-eyebrow {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }

  .header-title {
    font-size: 1.5rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    flex-wrap: wrap;
    gap: 10px;
  }

  #last-update {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  .btn-refresh {
    background: #fff;
    color: var(--guinda);
    border: none;
    border-radius: 100px;
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .btn-refresh:hover { background: var(--crema); transform: translateY(-1px); }
  .btn-refresh:active { transform: translateY(0); }
  .btn-refresh.loading { opacity: 0.7; pointer-events: none; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--crema2);
    border-top-color: var(--guinda);
    border-radius: 50%;
    display: none;
    animation: spin 0.7s linear infinite;
  }

  .btn-refresh.loading .spinner { display: block; }
  .btn-refresh.loading .btn-icon { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATUS PILL ── */
  #status-pill {
    margin: 14px 16px 0;
    padding: 8px 16px;
    background: var(--white);
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    color: var(--text2);
    font-weight: 500;
    box-shadow: var(--shadow);
    width: fit-content;
  }

  .sdot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--crema3);
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .sdot.ok    { background: var(--green); box-shadow: 0 0 0 3px var(--green-lt); }
  .sdot.error { background: #e05555; box-shadow: 0 0 0 3px #fde8e8; }
  .sdot.load  { background: var(--gold); box-shadow: 0 0 0 3px #fdf3e3; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── MAIN ── */
  main {
    padding: 20px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── KPI GRID ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .kpi-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
  }

  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  .kpi-card.featured {
    grid-column: span 2;
    background: var(--guinda);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 24px;
  }

  .kpi-icon {
    font-size: 1.8rem;
    margin-bottom: 8px;
    display: block;
  }

  .kpi-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .kpi-card.featured .kpi-label { color: rgba(255,255,255,0.65); }

  .kpi-value {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  .kpi-value.guinda  { color: var(--guinda); }
  .kpi-value.green   { color: var(--green); }
  .kpi-value.gold    { color: var(--gold); }
  .kpi-value.white   { color: #fff; }

  .kpi-sub {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 4px;
    font-weight: 500;
  }

  .kpi-card.featured .kpi-sub { color: rgba(255,255,255,0.55); }

  .kpi-badge {
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.72rem;
    font-weight: 700;
    color: #fff;
  }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title span {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.06em;
  }

  .chart-wrap { position: relative; height: 220px; }

  /* ── PROMO SPLIT ── */
  .promo-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .promo-half {
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
  }

  .promo-half.pagado { background: var(--green-lt); }
  .promo-half.gratis { background: var(--crema); }

  .promo-half-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .promo-half-val {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1;
  }

  .promo-half.pagado .promo-half-val { color: var(--green); }
  .promo-half.gratis .promo-half-val { color: var(--text3); }

  .promo-half-sub { font-size: 0.7rem; color: var(--text2); margin-top: 4px; }

  .ratio-bar-bg {
    height: 8px;
    background: var(--crema2);
    border-radius: 100px;
    overflow: hidden;
  }

  .ratio-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--guinda), var(--gold));
    border-radius: 100px;
    transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
  }

  .ratio-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text2);
  }

  /* ── AREAS LIST ── */
  .area-item {
    display: grid;
    grid-template-columns: 28px 1fr 56px 72px;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--crema);
  }

  .area-item:last-child { border-bottom: none; }

  .area-rank {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--crema3);
    text-align: center;
  }

  .area-rank.r1 { color: var(--gold); }
  .area-rank.r2 { color: var(--text3); }
  .area-rank.r3 { color: #c4956a; }

  .area-info { min-width: 0; }

  .area-name {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .area-bar-bg {
    height: 4px;
    background: var(--crema2);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 5px;
  }

  .area-bar-fill {
    height: 100%;
    background: var(--guinda);
    border-radius: 100px;
    transition: width 0.9s cubic-bezier(0.16,1,0.3,1);
  }

  .area-tickets {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--guinda);
    text-align: right;
  }

  .area-soles {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--gold);
    text-align: right;
  }

  /* ── METRICS ── */
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--crema);
  }

  .metric-row:last-child { border-bottom: none; }

  .metric-lbl {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text2);
  }

  .metric-val {
    font-size: 0.88rem;
    font-weight: 800;
    color: var(--text);
  }

  /* ── TICKETS TABLE ── */
  .ticket-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 160px;
    background: var(--crema);
    border: 1.5px solid var(--crema2);
    border-radius: 100px;
    padding: 9px 16px;
    font-family: var(--font);
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--guinda); }
  .search-box::placeholder { color: var(--text3); }

  .filter-pill {
    background: var(--crema);
    border: 1.5px solid var(--crema2);
    border-radius: 100px;
    padding: 9px 16px;
    font-family: var(--font);
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text2);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .filter-pill:focus { border-color: var(--guinda); }

  /* Table scroll wrapper */
  .table-scroll { overflow-x: auto; border-radius: var(--radius-sm); }

  table.tickets { width: 100%; border-collapse: collapse; font-size: 0.8rem; }

  table.tickets thead tr { background: var(--guinda); }

  table.tickets th {
    padding: 11px 14px;
    text-align: left;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  table.tickets th:hover { background: var(--guinda-lt); }

  table.tickets tbody tr {
    border-bottom: 1px solid var(--crema);
    transition: background 0.12s;
  }

  table.tickets tbody tr:hover { background: var(--crema); }

  table.tickets td {
    padding: 10px 14px;
    color: var(--text);
    white-space: nowrap;
  }

  .tid {
    font-size: 1rem;
    font-weight: 800;
    color: var(--guinda);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .badge.pagado { background: var(--green-lt); color: var(--green); }
  .badge.gratis  { background: var(--crema2); color: var(--text2); }

  .soles-cell {
    font-weight: 800;
    font-size: 0.88rem;
  }

  .soles-cell.p { color: var(--green); }
  .soles-cell.g { color: var(--text3); }

  /* Pagination */
  .pag {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .pag-info {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text2);
  }

  .pag-btns { display: flex; gap: 8px; }

  .pag-btn {
    background: var(--white);
    border: 1.5px solid var(--crema2);
    border-radius: 100px;
    padding: 7px 16px;
    font-family: var(--font);
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }

  .pag-btn:hover:not(:disabled) {
    background: var(--guinda);
    color: #fff;
    border-color: var(--guinda);
  }

  .pag-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── EMPTY ── */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text2);
  }

  .empty-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; line-height: 1.6; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 28px 20px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  footer strong { color: var(--guinda); }

  /* ── RESPONSIVE ── */
  @media (min-width: 600px) {
    header { margin: 0 24px; padding: 28px 28px 32px; }
    main { padding: 24px 24px 60px; }
    #status-pill { margin: 16px 24px 0; }
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
    .kpi-card.featured { grid-column: span 4; }
  }

  @media (min-width: 900px) {
    header { margin: 0 32px; }
    main { padding: 28px 32px 60px; }
    #status-pill { margin: 18px 32px 0; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-eyebrow">El Sentimiento Guinda</div>
  <div class="header-title">🎫 Dashboard de Boletos</div>
  <div class="header-bottom">
    <div id="last-update">— Aún sin datos cargados —</div>
    <button class="btn-refresh" id="btn-refresh" onclick="fetchData()">
      <div class="spinner"></div>
      <span class="btn-icon">↻</span>
      Actualizar
    </button>
  </div>
</header>

<!-- STATUS -->
<div id="status-pill">
  <span class="sdot" id="sdot"></span>
  <span id="stext">Presiona Actualizar para cargar los datos</span>
</div>

<!-- MAIN -->
<main id="main">
  <div class="empty">
    <span class="empty-emoji">🎫</span>
    <p>Presiona <strong style="color:var(--guinda)">Actualizar</strong> para<br>consultar los boletos desde SharePoint.</p>
  </div>
</main>

<footer><strong>El Sentimiento Guinda</strong> · Pasión · Tradición · Emoción</footer>

<script>
const ENDPOINT = 'https://defaultef18f8a5d24a41338b5529106fa5b7.72.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/d500598a21f04a91adf9ff407c79fe21/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=J8qStV9Xflurg1-2UMl8x86RwGZ6-d6WBtq2hY6xqLc';

let all = [], filtered = [], page = 1, sortCol = null, sortDir = 1;
const PER_PAGE = 15;
let cPromo = null, cAreas = null;

// ── FETCH ──────────────────────────────────────────────────────
async function fetchData() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  setStatus('load', 'Conectando con SharePoint...');

  try {
    const res = await fetch(ENDPOINT, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    if (!res.ok) throw new Error('Error HTTP ' + res.status);
    const data = await res.json();
    all = Array.isArray(data) ? data : (data.boletos || data.value || []);
    filtered = all.map(norm);
    page = 1;
    renderAll();
    setStatus('ok', all.length + ' boletos cargados correctamente');
    document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-PE');
  } catch(e) {
    setStatus('error', 'No se pudo conectar — ' + e.message);
    document.getElementById('main').innerHTML =
      `<div class="empty"><span class="empty-emoji">😕</span><p>No se pudo conectar al servidor.<br><small style="color:var(--text3)">${e.message}</small></p></div>`;
  } finally {
    btn.classList.remove('loading');
  }
}

// ── NORMALIZE ─────────────────────────────────────────────────
function norm(b) {
  const p = b.Promocion || b.Promoción || b.promocion || b.promoción || '';
  const ps = p.toString().trim().toLowerCase();
  const pagado = !(ps==='sí'||ps==='si'||ps==='yes'||ps==='1'||ps==='true');
  return {
    id:     b.ID_Ticket || b.Id_Ticket || b.PedidoID || b.Title || '',
    nombre: b['Nombre completo'] || b.NombreCompleto || b.Nombre || b.nombre || '',
    dni:    b.DNI || b.dni || '',
    tel:    b.Teléfono || b.Telefono || b.telefono || '',
    area:   (b.Area || b.Área || b.area || 'Sin área').toString().trim().toUpperCase(),
    promo:  pagado ? 'No' : 'Sí',
    pagado,
  };
}

function pct(a,t) { return t ? Math.round(a/t*100) : 0; }

// ── RENDER ALL ─────────────────────────────────────────────────
function renderAll() {
  const n = all.map(norm);
  const total   = n.length;
  if (!total) {
    document.getElementById('main').innerHTML =
      '<div class="empty"><span class="empty-emoji">📭</span><p>No hay boletos en la lista.</p></div>';
    return;
  }

  const pagados = n.filter(b => b.pagado);
  const gratis  = n.filter(b => !b.pagado);
  const ingresos = pagados.length * 5;

  // Areas
  const am = {};
  n.forEach(b => {
    if (!am[b.area]) am[b.area] = { t:0, p:0 };
    am[b.area].t++;
    if (b.pagado) am[b.area].p++;
  });
  const areas = Object.entries(am)
    .map(([name,d]) => ({ name, tickets:d.t, pagados:d.p, ingresos:d.p*5 }))
    .sort((a,b) => b.tickets - a.tickets);
  const maxT = areas[0]?.tickets || 1;

  document.getElementById('main').innerHTML = `

    <!-- KPIs -->
    <div>
      <div class="section-label">📊 Resumen general</div>
      <div class="kpi-grid">
        <div class="kpi-card featured">
          <div>
            <div class="kpi-label">Ingresos Totales</div>
            <div class="kpi-value white" style="font-size:2.6rem">S/ ${ingresos.toLocaleString('es-PE')}</div>
            <div class="kpi-sub">${pagados.length} tickets × S/ 5.00</div>
          </div>
          <div class="kpi-badge">${pct(pagados.length,total)}% pagado</div>
        </div>

        <div class="kpi-card">
          <span class="kpi-icon">🎫</span>
          <div class="kpi-label">Total Boletos</div>
          <div class="kpi-value guinda">${total.toLocaleString()}</div>
          <div class="kpi-sub">en la lista</div>
        </div>

        <div class="kpi-card">
          <span class="kpi-icon">✅</span>
          <div class="kpi-label">Pagados</div>
          <div class="kpi-value green">${pagados.length.toLocaleString()}</div>
          <div class="kpi-sub">Promo = No</div>
        </div>

        <div class="kpi-card">
          <span class="kpi-icon">🎁</span>
          <div class="kpi-label">Cortesía</div>
          <div class="kpi-value" style="color:var(--text3)">${gratis.length.toLocaleString()}</div>
          <div class="kpi-sub">Promo = Sí</div>
        </div>

        <div class="kpi-card">
          <span class="kpi-icon">🏷️</span>
          <div class="kpi-label">Áreas activas</div>
          <div class="kpi-value gold">${areas.length}</div>
          <div class="kpi-sub">con ventas</div>
        </div>
      </div>
    </div>

    <!-- Balance pagados vs cortesía -->
    <div>
      <div class="section-label">⚖️ Balance de boletos</div>
      <div class="card">
        <div class="card-title">Pagados vs Cortesía <span>${total} TOTAL</span></div>
        <div class="promo-split">
          <div class="promo-half pagado">
            <div class="promo-half-label">✅ Pagados</div>
            <div class="promo-half-val">${pagados.length}</div>
            <div class="promo-half-sub">S/ ${ingresos.toLocaleString('es-PE')}</div>
          </div>
          <div class="promo-half gratis">
            <div class="promo-half-label">🎁 Cortesía</div>
            <div class="promo-half-val">${gratis.length}</div>
            <div class="promo-half-sub">S/ 0</div>
          </div>
        </div>
        <div class="ratio-bar-bg">
          <div class="ratio-bar-fill" id="ratio-fill" style="width:0%"></div>
        </div>
        <div class="ratio-labels">
          <span style="color:var(--guinda)">${pct(pagados.length,total)}% pagados</span>
          <span>${pct(gratis.length,total)}% cortesía</span>
        </div>
      </div>
    </div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" id="charts-row">
      <div class="card">
        <div class="card-title">Distribución <span>DONUT</span></div>
        <div class="chart-wrap"><canvas id="cPromo"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Ingresos por área <span>S/</span></div>
        <div class="chart-wrap"><canvas id="cAreas"></canvas></div>
      </div>
    </div>

    <!-- Areas ranking -->
    <div>
      <div class="section-label">🏆 Ranking por área</div>
      <div class="card">
        <div class="card-title">Áreas con más boletos vendidos <span>${areas.length} ÁREAS</span></div>
        ${areas.map((a,i) => `
          <div class="area-item">
            <div class="area-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
            <div class="area-info">
              <div class="area-name">${a.name}</div>
              <div class="area-bar-bg">
                <div class="area-bar-fill" style="width:${pct(a.tickets,maxT)}%"></div>
              </div>
            </div>
            <div class="area-tickets">${a.tickets} 🎫</div>
            <div class="area-soles">S/ ${a.ingresos.toLocaleString('es-PE')}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Métricas -->
    <div>
      <div class="section-label">📈 Métricas clave</div>
      <div class="card">
        <div class="metric-row"><span class="metric-lbl">Área líder en ventas</span><span class="metric-val" style="color:var(--gold)">${areas[0]?.name||'—'}</span></div>
        <div class="metric-row"><span class="metric-lbl">Tickets área líder</span><span class="metric-val">${areas[0]?.tickets||0}</span></div>
        <div class="metric-row"><span class="metric-lbl">Promedio ingresos por área</span><span class="metric-val">S/ ${areas.length?Math.round(ingresos/areas.length).toLocaleString('es-PE'):0}</span></div>
        <div class="metric-row"><span class="metric-lbl">Valor real por ticket</span><span class="metric-val">S/ ${total?(ingresos/total).toFixed(2):'0.00'}</span></div>
        <div class="metric-row"><span class="metric-lbl">Ratio pagado : cortesía</span><span class="metric-val">${pagados.length} : ${gratis.length}</span></div>
      </div>
    </div>

    <!-- Tickets table -->
    <div>
      <div class="section-label">🗂️ Detalle de boletos</div>
      <div class="card" id="tickets-section">
        <div class="ticket-controls">
          <input class="search-box" id="q" placeholder="🔍  Buscar por nombre, DNI, N° boleto, área…" oninput="applyF()">
          <select class="filter-pill" id="fp" onchange="applyF()">
            <option value="">Todos</option>
            <option value="No">Pagados</option>
            <option value="Sí">Cortesía</option>
          </select>
          <select class="filter-pill" id="fa" onchange="applyF()">
            <option value="">Todas las áreas</option>
            ${areas.map(a=>`<option value="${a.name}">${a.name}</option>`).join('')}
          </select>
        </div>
        <div class="table-scroll">
          <table class="tickets">
            <thead><tr>
              <th onclick="srt('id')">N° Boleto ↕</th>
              <th onclick="srt('nombre')">Nombre ↕</th>
              <th>DNI</th>
              <th>Teléfono</th>
              <th onclick="srt('area')">Área ↕</th>
              <th onclick="srt('promo')">Tipo ↕</th>
              <th>Pago</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="pag">
          <span class="pag-info" id="pag-info"></span>
          <div class="pag-btns">
            <button class="pag-btn" id="pPrev" onclick="goPage(-1)">← Anterior</button>
            <button class="pag-btn" id="pNext" onclick="goPage(1)">Siguiente →</button>
          </div>
        </div>
      </div>
    </div>`;

  // Animate ratio bar
  setTimeout(() => {
    const f = document.getElementById('ratio-fill');
    if (f) f.style.width = pct(pagados.length, total) + '%';
  }, 80);

  // Responsive charts row
  if (window.innerWidth < 540) {
    const cr = document.getElementById('charts-row');
    if (cr) cr.style.gridTemplateColumns = '1fr';
  }

  window._norm = n;
  filtered = [...n];
  applyF();
  buildCharts(pagados.length, gratis.length, areas);
}

// ── TABLE ──────────────────────────────────────────────────────
function applyF() {
  const q  = (document.getElementById('q')?.value||'').toLowerCase();
  const fp = document.getElementById('fp')?.value||'';
  const fa = document.getElementById('fa')?.value||'';
  const src = window._norm || [];
  filtered = src.filter(b =>
    (!q  || b.nombre.toLowerCase().includes(q) || b.dni.includes(q) || b.id.toString().includes(q) || b.area.toLowerCase().includes(q)) &&
    (!fp || b.promo === fp) &&
    (!fa || b.area === fa)
  );
  page = 1;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  if (!tbody) return;
  const start = (page-1)*PER_PAGE;
  const slice = filtered.slice(start, start+PER_PAGE);
  const total = filtered.length;
  tbody.innerHTML = slice.map(b => `
    <tr>
      <td><span class="tid">${b.id||'—'}</span></td>
      <td style="font-weight:600">${b.nombre||'—'}</td>
      <td style="font-size:0.78rem;color:var(--text2)">${b.dni||'—'}</td>
      <td style="font-size:0.78rem;color:var(--text2)">${b.tel||'—'}</td>
      <td style="font-size:0.75rem;font-weight:700">${b.area}</td>
      <td><span class="badge ${b.pagado?'pagado':'gratis'}">${b.pagado?'✅ Pagado':'🎁 Cortesía'}</span></td>
      <td><span class="soles-cell ${b.pagado?'p':'g'}">${b.pagado?'S/ 5.00':'—'}</span></td>
    </tr>`).join('') ||
    `<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--text3);font-weight:600">Sin resultados para este filtro</td></tr>`;

  document.getElementById('pag-info').textContent = `${start+1}–${Math.min(start+PER_PAGE,total)} de ${total}`;
  document.getElementById('pPrev').disabled = page <= 1;
  document.getElementById('pNext').disabled = page >= Math.ceil(total/PER_PAGE);
}

function goPage(d) {
  page = Math.max(1, Math.min(page+d, Math.ceil(filtered.length/PER_PAGE)));
  renderTable();
  document.getElementById('tickets-section')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function srt(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  filtered.sort((a,b) => (a[col]||'').toString().localeCompare((b[col]||'').toString(),'es')*sortDir);
  page=1; renderTable();
}

// ── CHARTS ────────────────────────────────────────────────────
function buildCharts(nP, nG, areas) {
  Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";
  Chart.defaults.color = '#7a5c5c';

  if (cPromo) cPromo.destroy();
  cPromo = new Chart(document.getElementById('cPromo'), {
    type: 'doughnut',
    data: {
      labels: ['Pagados', 'Cortesía'],
      datasets: [{ data:[nP,nG], backgroundColor:['#2e7d55','#e0d0b8'], borderColor:['#fff','#fff'], borderWidth:3, hoverOffset:8 }]
    },
    options: { responsive:true, maintainAspectRatio:false, cutout:'62%',
      plugins: { legend:{labels:{font:{size:11},padding:16}},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed} (${pct(c.parsed,nP+nG)}%)`}} }
    }
  });

  if (cAreas) cAreas.destroy();
  const top = areas.slice(0,8);
  cAreas = new Chart(document.getElementById('cAreas'), {
    type: 'bar',
    data: {
      labels: top.map(a => a.name.length>10 ? a.name.slice(0,10)+'…' : a.name),
      datasets: [{ label:'S/', data:top.map(a=>a.ingresos),
        backgroundColor: top.map((_,i) => i===0?'#c9973a':'#7a1420'), borderRadius:6 }]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` S/ ${c.parsed.y.toLocaleString('es-PE')}`}} },
      scales:{
        x:{ ticks:{font:{size:9}}, grid:{display:false} },
        y:{ ticks:{font:{size:9},callback:v=>'S/'+v}, grid:{color:'#f0e8dc'} }
      }
    }
  });
}

// ── STATUS ────────────────────────────────────────────────────
function setStatus(type, msg) {
  const d = document.getElementById('sdot');
  d.className = 'sdot' + (type==='ok'?' ok':type==='error'?' error':type==='load'?' load':'');
  document.getElementById('stext').textContent = msg;
}
</script>
</body>
</html>
